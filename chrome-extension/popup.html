<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quorbit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; width: 300px; padding: 0; background: #fff; }
    .header { background: #4F46E5; color: #fff; padding: 14px 16px; }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p  { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .body { padding: 14px 16px; }
    label { display: block; font-size: 11px; color: #6B7280; margin-bottom: 3px; margin-top: 10px; }
    input { width: 100%; padding: 6px 8px; border: 1px solid #D1D5DB; border-radius: 5px; font-size: 12px; }
    button { width: 100%; margin-top: 14px; padding: 8px; background: #4F46E5; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button:hover { background: #4338CA; }
    .status { margin-top: 10px; font-size: 12px; color: #059669; text-align: center; min-height: 16px; }
    .stats { margin-top: 12px; padding-top: 12px; border-top: 1px solid #F3F4F6; font-size: 11px; color: #6B7280; text-align: center; }
    .stats strong { color: #111827; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Quorbit Capture</h1>
    <p>Save LinkedIn &amp; Naukri profiles to your pool</p>
  </div>
  <div class="body">
    <label>Quorbit API Key</label>
    <input type="password" id="apiKey" placeholder="qbt_..." />

    <label>Company ID</label>
    <input type="text" id="companyId" placeholder="Your Quorbit company ID" />

    <button id="save">Save Settings</button>
    <div class="status" id="status"></div>

    <div class="stats">
      Profiles captured this session: <strong id="count">0</strong>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
